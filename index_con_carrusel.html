<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anuncios Colegio Pestalozzi</title>
<style>
 body { font-family: Arial, sans-serif; background: #f2f2f2; margin: 0; }
 header { background: #003366; color: white; padding: 25px; text-align: center; }
 #logo-colegio { width: 160px; margin-bottom: 15px; }
 .contenedor { max-width: 900px; margin: auto; padding: 20px; }
 .banner { background: white; padding: 20px; margin-bottom: 25px; border-left: 6px solid #003366; border-radius: 5px; }
 h2 { color: #003366; margin-top: 0; }
 .importante { border-left: 6px solid #cc0000 !important; }
 ul { margin: 0; padding-left: 20px; }
 /* Carousel CSS */
 .carousel-container { position: relative; max-width: 900px; margin: 40px auto; overflow: hidden; border-radius: 10px; background: white; }
 .carousel-slide { display: flex; width: 100%; transition: transform 0.5s ease-in-out; }
 .carousel-slide img { width: 100%; flex-shrink: 0; border-radius: 10px; }
 .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: white; border: none; padding: 10px 15px; cursor: pointer; font-size: 22px; border-radius: 7px; }
 #prevBtn { left: 10px; }
 #nextBtn { right: 10px; }
</style>
</head>
<body>
<header>
<img id="logo-colegio" src="img/logo-pestalozzi.jpg" alt="Logo Colegio Pestalozzi">
<h1>U.E. Colegio Pestalozzi</h1>
<p>Tablero de Anuncios y Normas 2025 - 2026</p>
</header>
<div class="contenedor">

<div class="banner">
<h2 style="text-align:center;">Horarios del Colegio</h2>
<div class="carousel-container">
  <div class="carousel-slide" id="carouselSlide">
    <img src="assets/horarios/horario_1.png">
    <img src="assets/horarios/horario_2.png">
    <img src="assets/horarios/horario_3.png">
    <img src="assets/horarios/horario_4.png">
    <img src="assets/horarios/horario_5.png">
    <img src="assets/horarios/horario_6.png">
    <img src="assets/horarios/horario_7.png">
    <img src="assets/horarios/horario_8.png">
    <img src="assets/horarios/horario_9.png">
    <img src="assets/horarios/horario_10.png">
    <img src="assets/horarios/horario_11.png">
  </div>
  <button id="prevBtn" class="carousel-btn">❮</button>
  <button id="nextBtn" class="carousel-btn">❯</button>
</div>
</div>

<!-- rest of existing content omitted for brevity but would be inserted -->

<script>
const slide = document.getElementById("carouselSlide");
const imgs = slide.querySelectorAll("img");
let index = 0;
function move(n) {
  index += n;
  if (index < 0) index = imgs.length - 1;
  if (index >= imgs.length) index = 0;
  slide.style.transform = "translateX(-" + index * 100 + "% )";
}
document.getElementById("prevBtn").onclick = () => move(-1);
document.getElementById("nextBtn").onclick = () => move(1);
</script>
</body>
</html>
